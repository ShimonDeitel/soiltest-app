name: Soiltest
options:
  bundleIdPrefix: com.shimondeitel.soiltest
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Soiltest:
    type: application
    platform: iOS
    sources:
      - path: Soiltest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.soiltest
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Soiltest/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SoiltestTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SoiltestTests
      - path: Soiltest.storekit
    dependencies:
      - target: Soiltest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.soiltest.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SoiltestUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SoiltestUITests
    dependencies:
      - target: Soiltest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.soiltest.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Soiltest:
    build:
      targets:
        Soiltest: all
        SoiltestTests: [test]
        SoiltestUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Soiltest.storekit
    test:
      config: Debug
      storeKitConfiguration: Soiltest.storekit
      targets:
        - SoiltestTests
        - SoiltestUITests
    archive:
      config: Release
